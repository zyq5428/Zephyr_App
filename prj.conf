#
# Kernel & System (内核与系统基础)
#
# 定义系统时钟滴答的频率
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
# 启用 Newlib C 库
CONFIG_NEWLIB_LIBC=y
# LVGL初始化或文件系统操作会复用main stack，因此需要增加 main stack size
CONFIG_MAIN_STACK_SIZE=4096
# 开启 Zephyr 的输入子系统
CONFIG_INPUT=y

#
# ==========================================================
# 第一部分：Console (控制台) - 解决“信息从哪发出来”
# ==========================================================
# 启用控制台基础功能
CONFIG_CONSOLE=y

# 【关键点】必须为 y！
# 它是内核启动早期（Shell还没启动时）打印 Zephyr 版本信息的唯一通道。
# 如果设为 n，你将看不到 "*** Booting Zephyr OS ***" 这一行。
CONFIG_UART_CONSOLE=y

# 允许 printk 函数将信息发送到控制台
CONFIG_STDOUT_CONSOLE=y

# ==========================================================
# 第二部分：Logging (日志) - 解决“系统发生了什么”
# ==========================================================
# 启用日志系统
CONFIG_LOG=y

# 设置日志的显示模式
# 由于我们要用 Shell 来显示日志，所以禁用掉原始的 UART 直接输出模式，
# 防止日志和 Shell 的字符在屏幕上打架（乱码）。
CONFIG_LOG_BACKEND_UART=n

# 允许 printk 输出的信息也被当作日志处理
CONFIG_LOG_PRINTK=y

# 日志级别设置（4 是最高级别 INFO，能看到大部分信息）
CONFIG_LOG_MAX_LEVEL=4

# ==========================================================
# 第三部分：Shell (外壳) - 解决“如何与开发板交互”
# ==========================================================
# 启用 Shell 功能
CONFIG_SHELL=y
CONFIG_SHELL_BACKENDS=y

# 启用串口作为 Shell 的后端（让你可以通过串口助手输入命令）
CONFIG_SHELL_BACKEND_SERIAL=y

# 启用 Shell 的日志后端
# 作用：让 Shell 接管 Log 系统的输出。
# 开启后，当系统产生日志时，Shell 会整齐地把它打印出来，
# 并且不会打断你正在输入的命令行（它会自动处理换行和光标）。
CONFIG_SHELL_LOG_BACKEND=y

# 设置 Shell 提示符，你在串口看到的就会是 my_board:~$
CONFIG_SHELL_PROMPT_UART="zephyr:~$ "

# ==========================================================
# 文件系统 - 解决“如何访问外部存储设备”
# ==========================================================
# 开启文件系统子系统
CONFIG_FILE_SYSTEM=y
# 开启 LittleFS 软件库
CONFIG_FILE_SYSTEM_LITTLEFS=y
# 开启 Flash 映射，这样才能通过 label 找到分区
CONFIG_FLASH_MAP=y
# 开启 Flash 页面布局 API
CONFIG_FLASH_PAGE_LAYOUT=y
# 启用 Shell 文件系统命令（如 ls、cat、mkdir 等）
CONFIG_FILE_SYSTEM_SHELL=y

#
# Core Drivers: Serial/UART (核心驱动：串行/UART)
#
# 启用串行子系统
CONFIG_SERIAL=y
# 启用中断驱动模式 (高效)
CONFIG_UART_INTERRUPT_DRIVEN=y

# 启用浮点支持，以便在日志中打印浮点数
CONFIG_CBPRINTF_FP_SUPPORT=y

# 启用 DMA 核心支持
CONFIG_DMA=y

# 启用 PWM
CONFIG_PWM=y
CONFIG_PWM_STM32=y

#
# Core Drivers: GPIO (通用输入/输出)
#
# 启用 GPIO 核心支持
CONFIG_GPIO=y
# 启用 STM32 硬件 GPIO 驱动
CONFIG_GPIO_STM32=y

#
# Core Drivers: I2C
#
# 启用 I2C 核心支持
CONFIG_I2C=y
# 开启软件模拟 I2C 驱动
CONFIG_I2C_GPIO=y
# 启用 STM32 硬件 I2C 驱动
CONFIG_I2C_STM32=y
# 启用中断驱动模式
CONFIG_I2C_STM32_INTERRUPT=y

#
# Core Drivers: QSPI/Flash (W25Q128)
#
# 启用 Flash API 核心支持
CONFIG_FLASH=y
# 启用使用 STM32 HAL 库实现的 QSPI 驱动
CONFIG_FLASH_STM32_QSPI=y
# 启用 STM32 内存映射模式支持 (直接访问外部 Flash)
CONFIG_STM32_MEMMAP=y

#
# Core Drivers: Standard SPI
#
# 启用标准 SPI 核心支持 (如果需要连接 SPI 传感器/屏幕)
CONFIG_SPI=y
CONFIG_SPI_STM32=y
# 暂时关闭 SPI DMA 传输，强制使用轮询/中断模式
# CONFIG_SPI_STM32_DMA=n
# 启用 SPI DMA 传输
CONFIG_SPI_STM32_DMA=y
# 建议开启日志以便调试
# CONFIG_SPI_LOG_LEVEL_DBG=y

#
# Core Drivers: RTC (实时时钟)
#
# 启用 RTC 核心支持
CONFIG_RTC=y
# 启用 STM32 硬件 RTC 驱动
CONFIG_RTC_STM32=y
# 启用 RTC 闹钟功能
CONFIG_RTC_ALARM=y

#
# Core Drivers: LED (发光二极管)
#
# 启用 LED 核心驱动框架
CONFIG_LED=y
# 启用 GPIO LED 驱动 (用于开关控制)
CONFIG_LED_GPIO=y
# 启用 PWM LED 驱动 (用于亮度调节)
CONFIG_LED_PWM=y

#
# Core Drivers: Pin Controller and HW Info (引脚控制器与硬件信息)
#
# 启用引脚控制器核心支持
CONFIG_PINCTRL=y
# 启用 STM32 引脚控制器驱动
CONFIG_PINCTRL_STM32=y
# 启用硬件信息核心支持
CONFIG_HWINFO=y
# 启用 STM32 硬件信息驱动 (读取芯片ID等)
CONFIG_HWINFO_STM32=y

#
# 12. Display Driver (显示驱动 - LCD)
#
# 启用显示子系统
CONFIG_DISPLAY=y

# 使用 SSD1306 OLED 驱动 (I2C)
# Disable Zephyr built-in SSD1306 driver to use our custom driver
# CONFIG_SSD1306 is not set

# LVGL GUI
CONFIG_LVGL=y
# LVGL 颜色深度设置
# CONFIG_LV_COLOR_DEPTH_1=y
# LVGL 内存池大小设置 (16 KB)
CONFIG_LV_Z_MEM_POOL_SIZE=16384
# 绘图缓冲区（画布大小，128x16 像素，约 256 字节 RAM）
CONFIG_LV_Z_VDB_SIZE=10
# 启用 Montserrat 字体支持
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_32=y
CONFIG_LV_FONT_MONTSERRAT_48=y
# 启用 16 位颜色字节交换 (RGB565 格式)
# 如果不开启 SWAP:数据存储顺序可能是 [高8位] [低8位](Big Endian)。
# 开启 SWAP 后：数据会被软件强制变成 [低8位] [高8位](Little Endian)。
# SPI 接口发送数据通常是按字节发送的,如果MCU是小端模式(Little Endian),
# 而屏幕期望的是大端数据（或者反过来）,像素传过去后,字节顺序反了.
# 现象:屏幕能显示图像,但颜色非常诡异,像杂色、花屏,或者颜色有颗粒感.
CONFIG_LV_COLOR_16_SWAP=y
# LVGL默认字体设置
# CONFIG_LV_FONT_DEFAULT_MONTSERRAT_8=y
# LVGL组件开关(默认开启了很多组件，根据需要关闭)
# CONFIG_LV_USE_LABEL=n
# 开启LVGL Demo
CONFIG_LV_BUILD_DEMOS=y
# 开启基础控件 Demo
CONFIG_LV_USE_DEMO_WIDGETS=y
# 开启基准测试 Demo
# CONFIG_LV_USE_DEMO_BENCHMARK=y
# 智能手表 Demo
# CONFIG_LV_USE_DEMO_SMARTWATCH=y

# --- 必须开启的核心统计开关 ---
# 这个开关允许 Zephyr 追踪堆内存的使用情况
CONFIG_SYS_HEAP_RUNTIME_STATS=y
# 启用 LVGL 监控功能
CONFIG_LV_USE_SYSMON=y
# 允许 LVGL 监控内存使用情况(自带的适合大屏幕，小屏幕用不了)
# CONFIG_LV_USE_MEM_MONITOR=y
# 提高 LVGL 自身的日志级别，观察它在初始化驱动时到底卡在哪了
CONFIG_LV_USE_LOG=y
# CONFIG_LV_LOG_LEVEL_TRACE=y

# 启用 ST7789V 驱动程序
# CONFIG_ST7789V=y

# 启用 MIPI DBI 子系统 (MIPI Display Bus Interface)
# CONFIG_MIPI_DBI=y

# 启用 MIPI DBI 的 SPI 模式实现
# CONFIG_MIPI_DBI_SPI=y

# Display 日志级别
# CONFIG_DISPLAY_LOG_LEVEL_DBG=y
# CONFIG_I2C_LOG_LEVEL_DBG=y
# CONFIG_SPI_LOG_LEVEL_DBG=y

